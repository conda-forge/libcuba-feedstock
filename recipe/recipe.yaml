context:
  version: "4.2.2"

package:
  name: libcuba
  version: ${{ version }}

source:
  url: https://feynarts.de/cuba/Cuba-${{ version }}.tar.gz
  sha256: 8d9f532fd2b9561da2272c156ef7be5f3960953e4519c638759f1b52fe03ed52

  # from https://github.com/jschueller/cuba.git, author did not respond yet
  patches:
    - 0001-Add-CMake-script.patch
    - 0002-Fix-build-without-fork.patch 
    - 0003-Fix-build-on-MSVC.patch
    - 0005-Hardlink-KorobovCoeff.c.patch

build:
  number: 3

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cmake
    - ninja
  run_exports:
    - ${{ pin_subpackage('libcuba', upper_bound='x.x') }}

tests:
  - script:
    - if: unix
      then:
        - test -f ${PREFIX}/include/cuba.h
        - test -f ${PREFIX}/lib/libcuba${SHLIB_EXT}
      else:
        - if not exist %PREFIX%\\Library\\include\\cuba.h exit 1
        - if not exist %PREFIX%\\Library\\lib\\cuba.lib exit 1

about:
  homepage: "https://feynarts.de/cuba/"
  license: LGPL-3.0-only
  license_family: LGPL
  license_file: COPYING
  summary: "Cuba - a library for multidimensional numerical integration"
  
extra:
  recipe-maintainers:
    - jschueller
